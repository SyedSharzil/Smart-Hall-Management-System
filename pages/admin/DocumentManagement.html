<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document Management | Smart Hall</title>
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet" />
  <link rel="shortcut icon" href="../../images/RSM_Logo.png" type="image/x-icon" />
  <link rel="stylesheet" href="../../styles/base.css" />
  <link rel="stylesheet" href="../../styles/DocumentManagement.css" />

  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-storage-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
</head>

<body>
  <script src="../../scripts/preloader.js"></script>

  <div class="container">

    <main>
      <div class="top-section">
        <h1>Document Management</h1>
        <p>Upload and manage documents for students</p>
      </div>

      <div class="document-management">

        <div class="card upload-section">
          <span class="material-icons card-icon">upload_file</span>
          <div class="section-info">
            <h2>Upload New Document</h2>
            <form id="uploadForm">
              <div class="form-group">
                <label for="docTitle">Document Title</label>
                <input type="text" id="docTitle" placeholder="Enter document title" required>
              </div>
              <div class="form-group">
                <label for="docCategory">Category</label>
                <select id="docCategory" required>
                  <option value="">Select category</option>
                  <option value="notice">Notice</option>
                  <option value="academic">Academic</option>
                  <option value="administrative">Administrative</option>
                  <option value="events">Events</option>
                  <option value="other">Other</option>
                </select>
              </div>
              <div class="form-group">
                <label for="docDescription">Description</label>
                <textarea id="docDescription" rows="3" placeholder="Brief description of document"></textarea>
              </div>
              <div class="form-group">
                <label for="docVisibility">Visibility</label>
                <select id="docVisibility" required>
                  <option value="all">All Students</option>
                  <option value="specific">Specific Students</option>
                </select>
              </div>
              <div class="form-group" id="specificStudentsGroup" style="display: none;">
                <label for="specificStudents">Student IDs (comma separated)</label>
                <input type="text" id="specificStudents" placeholder="e.g., 10001, 10002, 10003">
              </div>
              <div class="form-group file-input-group">
                <label for="docFile">Upload File</label>
                <input type="file" id="docFile" required>
                <div class="file-name">No file chosen</div>
              </div>
              <button type="submit" class="action-btn upload-btn">Upload Document</button>
            </form>
          </div>
        </div>

        <div class="documents-list-container">
          <div class="documents-header">
            <h2>Uploaded Documents</h2>
            <div class="filter-section">
              <label for="filterCategory" class="visually-hidden">Filter by Category</label>
              <select id="filterCategory">
                <option value="all">All Categories</option>
                <option value="notice">Notice</option>
                <option value="academic">Academic</option>
                <option value="administrative">Administrative</option>
                <option value="events">Events</option>
                <option value="other">Other</option>
              </select>
            </div>
          </div>
          <div class="documents-list" id="documentsList">

            <div class="document-loading">Loading documents...</div>
          </div>
        </div>
      </div>
    </main>

  </div>

  <div class="upload-notification" id="uploadNotification">
    <div class="notification-content">
      <span class="material-icons notification-icon">check_circle</span>
      <p class="notification-message">Document uploaded successfully!</p>
    </div>
  </div>

  <script src="../../scripts/sidebar.js"></script>
  <script>initSidebar('admin', 'documents');</script>
  <script src="../../scripts/toast.js"></script>
  <script src="../../scripts/DocumentManagement.js"></script>
</body>

</html>
