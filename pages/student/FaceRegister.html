<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register Face | Smart Hall</title>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link rel="stylesheet" href="../../styles/base.css">
    <style>
        .face-register-container {
            max-width: 600px;
            margin: 2rem auto;
            padding: 2rem;
            background: white;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        
        .camera-preview {
            width: 100%;
            max-width: 500px;
            border: 2px solid #667eea;
            border-radius: 10px;
            margin: 1rem 0;
        }
        
        .button-group {
            display: flex;
            gap: 1rem;
            margin-top: 1.5rem;
        }
        
        .btn {
            flex: 1;
            padding: 0.8rem;
            border: none;
            border-radius: 5px;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .btn-primary {
            background: #667eea;
            color: white;
        }
        
        .btn-primary:hover {
            background: #5568d3;
        }
        
        .btn-secondary {
            background: #e0e0e0;
            color: #333;
        }
        
        .btn-secondary:hover {
            background: #d0d0d0;
        }
        
        .status-message {
            padding: 1rem;
            margin: 1rem 0;
            border-radius: 5px;
            text-align: center;
        }
        
        .status-success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        
        .status-error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        
        .status-info {
            background: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
        }
    </style>
</head>
<body>
    <div class="container">
        <main>
            <div class="face-register-container">
                <h1>📸 Register Your Face</h1>
                <p>Register your face for automatic attendance tracking</p>
                
                <div id="statusMessage"></div>
                
                <video id="cameraPreview" class="camera-preview" autoplay playsinline></video>
                
                <canvas id="canvas" style="display:none;"></canvas>
                
                <div class="button-group">
                    <button class="btn btn-primary" id="captureBtn">📷 Capture Photo</button>
                    <button class="btn btn-secondary" id="cancelBtn">Cancel</button>
                </div>
                
                <div id="loadingSpinner" style="display:none; text-align:center; margin:1rem 0;">
                    <p>Processing... Please wait</p>
                </div>
            </div>
        </main>
    </div>

    <script src="../../scripts/sidebar.js"></script>
    <script>initSidebar('student', 'dashboard');</script>
    <script src="../../scripts/toast.js"></script>
    
    <script>
        console.log('🔍 FaceRegister.html loaded');
        
        const urlParams = new URLSearchParams(window.location.search);
        const studentId = urlParams.get('studentId');
        
        console.log('🆔 Student ID:', studentId);
        
        const video = document.getElementById('cameraPreview');
        const canvas = document.getElementById('canvas');
        const captureBtn = document.getElementById('captureBtn');
        const cancelBtn = document.getElementById('cancelBtn');
        const statusMessage = document.getElementById('statusMessage');
        const loadingSpinner = document.getElementById('loadingSpinner');
        
        // Check if student ID exists
        if (!studentId) {
            showStatus('❌ Student ID not found. Please go back and try again.', 'error');
            captureBtn.disabled = true;
            console.error('❌ No student ID provided');
        } else {
            showStatus('✅ Loading camera... Please allow camera access', 'info');
        }
        
        // Start camera
        async function startCamera() {
            try {
                console.log('📹 Starting camera...');
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: 'user' }
                });
                video.srcObject = stream;
                console.log('✅ Camera started');
            } catch (error) {
                console.error('❌ Camera error:', error);
                showStatus(`❌ Camera access denied: ${error.message}`, 'error');
                captureBtn.disabled = true;
            }
        }
        
        // Capture photo
        captureBtn.addEventListener('click', async () => {
            if (!studentId) {
                showStatus('❌ Student ID not found', 'error');
                return;
            }
            
            try {
                console.log('📷 Capturing photo for student:', studentId);
                loadingSpinner.style.display = 'block';
                captureBtn.disabled = true;
                
                const ctx = canvas.getContext('2d');
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
                ctx.drawImage(video, 0, 0);
                
                // Get image as base64
                const imageBase64 = canvas.toDataURL('image/jpeg');
                
                console.log('📤 Sending face image to API...');
                
                // Send to API
                const response = await fetch('http://localhost:5000/api/register', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        student_id: studentId,
                        face_image: imageBase64
                    })
                });
                
                const data = await response.json();
                console.log('✅ API Response:', data);
                
                if (data.success && data.face_registered) {
                    showStatus('✅ Face registered successfully!', 'success');
                    setTimeout(() => {
                        window.history.back();
                    }, 2000);
                } else {
                    showStatus('❌ Face registration failed: ' + (data.message || 'Unknown error'), 'error');
                }
                
            } catch (error) {
                console.error('❌ Error:', error);
                showStatus('❌ Error: ' + error.message, 'error');
            } finally {
                loadingSpinner.style.display = 'none';
                captureBtn.disabled = false;
            }
        });
        
        // Cancel button
        cancelBtn.addEventListener('click', () => {
            console.log('❌ Face registration cancelled');
            window.history.back();
        });
        
        // Show status message
        function showStatus(message, type) {
            statusMessage.innerHTML = message;
            statusMessage.className = `status-message status-${type}`;
            console.log(`[${type.toUpperCase()}]`, message);
        }
        
        // Start camera on page load
        window.addEventListener('load', () => {
            if (studentId) {
                startCamera();
            }
        });
        
        // Stop camera on page unload
        window.addEventListener('beforeunload', () => {
            if (video.srcObject) {
                video.srcObject.getTracks().forEach(track => track.stop());
            }
        });
    </script>
</body>
</html>
