      </div>
      <div class="meal-wrapper">
        <div class="calendar-header">
          <button id="prevMonth"><span class="material-icons" style="font-size:1rem;vertical-align:middle;">chevron_left</span> Previous</button>

        </div>
        <div id="calendar"></div>
        <button id="submitMeals" class="submitMeals">Submit Meals</button>
        <div class="total-cost-card">
