<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guest Room Booking | Smart Hall</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preconnect" href="https://www.gstatic.com" crossorigin />

    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link rel="shortcut icon" href="../../images/RSM_Logo.png" type="image/x-icon" />
    <link rel="stylesheet" href="../../styles/base.css">
    <link rel="stylesheet" href="../../styles/GuestRoomBooking.css">
</head>

<body>
    <script src="../../scripts/preloader.js"></script>

    <div class="container">

        <main>
            <div class="page-header">
                <h1>Guest Room Booking</h1>
                <p>Book a room for your guests by filling in the details below.</p>
            </div>
            <section class="room-booking-form">
                <div style="text-align:center; margin-bottom:1rem;">
                    <span class="material-icons" style="font-size:2.5rem; color:var(--clr-primary);">hotel</span>
                    <h2 style="font-size:1.15rem; color:var(--clr-primary-variant); font-weight:600; margin-top:0.3rem;">Guest Information</h2>
                </div>
                <form id="guestRoomForm" action="#">
                    <div class="form-group">
                        <label for="nid">NID:</label>
                        <input type="text" id="nid" name="nid" required>
                    </div>
                    <div class="form-group">
                        <label for="name">Name:</label>
                        <input type="text" id="name" name="name" required>
                    </div>
                    <div class="form-group">
                        <label for="dob">Date of Birth:</label>
                        <input type="date" id="dob" name="dob" required>
                    </div>
                    <div class="form-group">
                        <label for="relationship">Relationship</label>
                        <select id="relationship" name="relationship" required>
                            <option value="" disabled selected>Select relation</option>
                            <option value="Father">Parent</option>
                            <option value="Friend">Friend</option>
                            <option value="Relative">Relative</option>
                            <option value="Other">Other</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="phone">Phone No.:</label>
                        <input type="tel" id="phone" name="phone" required>
                    </div>
                    <div class="form-group">
                        <label for="email">Email:</label>
                        <input type="email" id="email" name="email" required>
                    </div>
                    <div class="form-group date-group">
                        <div class="date-field">
                            <label for="checkin">Check-In Date:</label>
                            <input type="date" id="checkin" name="checkin" required>
                        </div>
                        <div class="date-field">
                            <label for="checkout">Check-Out Date:</label>
                            <input type="date" id="checkout" name="checkout" required>
                        </div>
                    </div>
                    <button type="submit">Book Room</button>
                </form>
            </section>
        </main>

    </div>
    <script src="../../scripts/sidebar.js"></script>
    <script>initSidebar('student', 'booking');</script>
    <script src="../../scripts/toast.js"></script>
    <script type="module" src="../../scripts/GuestRoomBooking.js"></script>
</body>

</html>
